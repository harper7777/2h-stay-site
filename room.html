<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>房型介紹｜2H分享家</title>
  <meta name="description" content="2H分享家房型介紹，包含少女心雙人房、綠意軒、蔚藍海、木の屋、林の屋、森の屋，以及10人、14人、24人組合房型。">
  <meta name="keywords" content="2H分享家房型,日月潭民宿房型,少女心,綠意軒,蔚藍海,木の屋,林の屋,森の屋,包棟民宿">
  <meta property="og:type" content="website">
  <meta property="og:title" content="房型介紹｜2H分享家">
  <meta property="og:description" content="查看2H分享家的雙人、四人、六人與多人組合房型。">
  <meta property="og:locale" content="zh_TW">
  <link rel="canonical" href="https://example.com/room.html">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/room.css">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "name": "2H分享家房型列表",
    "itemListElement": [
      {"@type":"ListItem","position":1,"name":"少女心 2人房"},
      {"@type":"ListItem","position":2,"name":"綠意軒 4人房"},
      {"@type":"ListItem","position":3,"name":"蔚藍海 4人房"},
      {"@type":"ListItem","position":4,"name":"木の屋 4人房"},
      {"@type":"ListItem","position":5,"name":"林の屋 4人房"},
      {"@type":"ListItem","position":6,"name":"森の屋 6人房"}
    ]
  }
  </script>
</head>

<body data-page="rooms">
  <div id="site-header"></div>

  <section class="room-hero">
    <div class="room-hero-mask"></div>
    <div class="room-hero-text reveal">
      <p>GUESTROOM</p>
      <h1>房型介紹</h1>
      <span>在不同房間裡，選擇一種適合自己的停留方式</span>
    </div>
    <div class="scroll-down"><span>SCROLL</span><div class="scroll-line"></div></div>
  </section>

  <main>
    <section class="room-intro reveal">
      <p class="section-subtitle">ROOMS</p>
      <h2>2H分享家住宿空間</h2>
      <p>從雙人旅行、家庭入住，到多人包棟需求，每一種房型都保留木質調與自然氛圍，讓旅人能在山城裡安靜休息。</p>
    </section>

    <section class="zoom-list-section" aria-label="房型卡片列表">
      <div class="zoom-list" id="roomList"></div>
    </section>

    <section class="package-section reveal">
      <p class="section-subtitle">GROUP ROOMS</p>
      <h2>多人組合房型</h2>
      <div class="package-grid" id="packageGrid"></div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="./js/layout.js"></script>
  <script src="./data/rooms.js"></script>
  <script src="./js/room-page.js"></script>
</body>
</html>
